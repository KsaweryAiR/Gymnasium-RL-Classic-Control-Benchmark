cartpole1:
  env_id: CartPole-v1
  replay_memory_size: 100000
  mini_batch_size: 32
  epsilon_init: 1
  epsilon_decay: 0.9905
  epsilon_min: 0.05
  network_sync_rate: 10
  learning_rate_a: 0.003
  discount_factor_g: 0.99
  stop_on_reward: 10000
  fc1_nodes: 64
  enable_double_dqn: true
  enable_dueling_dqn: true
  loss_function: MSELoss
  optimizer: Adam

flappybird1:
  env_id: FlappyBird-v0
  replay_memory_size: 200000
  mini_batch_size: 128
  epsilon_init: 1
  epsilon_decay: 0.99995
  epsilon_min: 0.05
  network_sync_rate: 100
  learning_rate_a: 0.0001
  discount_factor_g: 0.99
  stop_on_reward: 120
  fc1_nodes: 512
  env_make_params:
    use_lidar: false
  enable_double_dqn: true
  enable_dueling_dqn: true
  loss_function: MSELoss
  optimizer: Adam

lunarlander1:
  env_id: LunarLander-v3
  replay_memory_size: 100000
  mini_batch_size: 256
  epsilon_init: 1
  epsilon_decay: 0.9999
  epsilon_min: 0.05
  network_sync_rate: 100
  learning_rate_a: 0.0001
  discount_factor_g: 0.99
  stop_on_reward: 10000
  fc1_nodes: 256
  env_make_params:
    continuous: false
